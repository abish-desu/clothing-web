<!DOCTYPE html>
<html>
    <head>
        <meta charset = "utf-8" >
        <meta name = "viewport" content = "width = device-width, initial-scale=1.0">
        <title>Signup</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="style.css">
        <style>
             .footer p,a{font-size: 18px;}
        </style>
    </head>

    <body>
    <div class="wrapper">  
        <div class="heading">
            <h2>SIGNUP</h2>
        </div>
        <div class="content">
            <form name="formlogin" method="post" action="user_register.php" onsubmit="return formVal()">
                <div class="form-group">
                    <input type="text" class="form-control" name="name" placeholder="Full Name">
                    <i class="bi bi-person"></i>
                </div>
                <div class="form-group"> 
                    <input type="tel" class="form-control" name="phone" placeholder="Phone Number" pattern="[0-9]{10}">
                    <i class="bi bi-telephone"></i>
                </div>
                <div class="form-group">
                    <input type="email" class="form-control" name="email" placeholder="Email" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,3}$">
                    <i class="bi bi-envelope"></i>
                </div>
              
                <div class="form-group">
                    <input type="password" class="form-control" name="password" placeholder="Password" pattern=".{6,}">
                    <i class="bi bi-key" ></i>
                </div>

                <div class="form-group">
                    <input type="password" class="form-control" name="password_confirm" placeholder="Confirm Password" pattern=".{6,}">
                    <i class="bi bi-key" ></i>
                </div>
                
                <button type="submit" class="btn">Signup</button>
                
            </form>
        </div>
        <div class="footer"><p>Already have an account? <a href="login.html">Login</a></p></div>
    </div>  

    <script>
        function formVal(){
            let name=document.formlogin.name.value;
            let phone=document.formlogin.contact.value;
            let email=document.formlogin.email.value;
            let password=document.formlogin.password.value;
            let password_confirm=document.formlogin.password_confirm.value;
            if(name===""){
                alert("Please enter your name");
                return false;
            }
            if(phone===""){
                        alert("Please enter your phone number");
                        return false;
                    }
                    else if(phone.length!==10)
                    {
                        alert("Phone must be 10 digits");
                        return false;
                    }
            if(email===""){
            alert("Email is required");
            return false;
            }
            
            if(password===""){
            alert("Password is required");
            return false;
            }
            return true;
            }
    </script>
</body>
</html>
