<!DOCTYPE html>
<html>
    <head>
        <meta charset = "utf-8" >
        <meta name = "viewport" content = "width = device-width, initial-scale=1.0">
        <title>Login</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="style.css">

        <style>
         .footer p,a{font-size: 18px;}
    </style>
    </head>
    <body>


    <div class="wrapper">  
        <div class="heading">
            <h2>LOGIN</h2>
        </div>
        <div class="content">
            <p>Login to make a purchase.</p>
            <form name="loginForm" method="post" action="login_process.php" onsubmit="return valmyform()">
                <div class="form-group">
                    <input type="email" class="form-control" name="email" placeholder="Email" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,3}$" >
                    <i class="bi bi-envelope"></i>
                </div>
              
                <div class="form-group">
                    <input type="password" class="form-control" name="password" placeholder="Password" pattern=".{6,}">
                    <i class="bi bi-key" ></i>
                </div>
                
                <button type="submit" name="submit" class="btn">Login</button>
                
            </form>
        </div>
        <div class="footer"><p>Don't have an account yet? <a href="signup.html">Register</a></p></div>
    </div>  
    <script>
        function valmyform(){
            let email=document.loginForm.email.value;
            let password=document.loginForm.password.value;
            if(email===""){
            alert("Email is required");
            return false;
            }
            if(password===""){
            alert("Password is required");
            return false;
            }
            return true;
            }
    </script>
</body>
</html>
